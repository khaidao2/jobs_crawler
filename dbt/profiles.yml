job_lakehouse:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: job_lakehouse.duckdb
      extensions:
        - httpfs
        - parquet
      settings:
        s3_endpoint: minio:9000
        s3_access_key_id: "{{ env_var('MINIO_USER', 'admin') }}"
        s3_secret_access_key: "{{ env_var('MINIO_PASSWORD', 'changeme123') }}"
        s3_url_style: path
        s3_use_ssl: false
