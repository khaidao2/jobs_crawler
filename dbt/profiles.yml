job_lakehouse:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: /opt/airflow/dbt/job_lakehouse.duckdb
      extensions:
        - httpfs
        - parquet
      settings:
        s3_endpoint: minio:9000
        s3_access_key_id: admin
        s3_secret_access_key: changeme123
        s3_url_style: path
        s3_use_ssl: false
