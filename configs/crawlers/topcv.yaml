name: "topcv"
base_url: "https://www.topcv.vn"
list_url_template: "https://www.topcv.vn/tim-viec-lam-cong-nghe-thong-tin-cr257?type_keyword=1&category_family=r257&saturday_status=0&page={page}"
container_selector: ".job-item-2, .job-item-search-result"

headers:
  Referer: "https://www.topcv.vn/"
  Upgrade-Insecure-Requests: "1"
  # sec-ch-ua and other modern headers help bypass Cloudflare
  sec-ch-ua: '"Not_A Brand";v="8", "Chromium";v="120", "Google Chrome";v="120"'
  sec-ch-ua-mobile: "?0"
  sec-ch-ua-platform: '"Windows"'

fields:
  job_id:
    selector: null 
    attribute: "data-id"
  title:
    selector: "h3.title a span, h3.title span, .job-title"
    attribute: "text"
  company:
    selector: ".company-name, .company a"
    attribute: "text"
  url:
    selector: "h3.title a, .title a"
    attribute: "href"
  company_url:
    selector: ".company-name, .company a"
    attribute: "href"
  logo_url:
    selector: ".avatar img, .company-logo img"
    attribute: "src"
  salary:
    selector: "label.salary, .label-salary, .salary"
    attribute: "text"
  location:
    selector: "label.address, .label-location, .location"
    attribute: "text"
  experience:
    selector: "label.experience, .label-exp, .exp"
    attribute: "text"
  is_urgent:
    selector: "label.is-urgent, .label-urgent"
    attribute: "exists"
  company_verified:
    selector: "span.icon-verified-employer, .icon-verified"
    attribute: "exists"
