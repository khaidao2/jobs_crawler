dag:
  id: dbt_pipeline
  description: Run dbt transformations
  schedule: "@daily"
  owner: airflow
  retries: 1
  retry_delay_minutes: 5
  tasks:
    - id: dbt_run_staging
      operator: BashOperator
      command: "cd /opt/airflow/dbt && /home/airflow/.local/bin/dbt run --select staging --profiles-dir ."
      env:
        HOME: /home/airflow

    - id: dbt_run_intermediate
      operator: BashOperator
      command: "cd /opt/airflow/dbt && /home/airflow/.local/bin/dbt run --select intermediate --profiles-dir ."
      env:
        HOME: /home/airflow

    - id: dbt_run_marts
      operator: BashOperator
      command: "cd /opt/airflow/dbt && /home/airflow/.local/bin/dbt run --select marts --profiles-dir ."
      env:
        HOME: /home/airflow

    - id: dbt_test
      operator: BashOperator
      command: "cd /opt/airflow/dbt && /home/airflow/.local/bin/dbt test --profiles-dir ."
      env:
        HOME: /home/airflow

  dependencies:
    - [dbt_run_staging, dbt_run_intermediate, dbt_run_marts, dbt_test]