version: "3.9"

networks:
  data-platform:
    driver: bridge

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    networks:
      - data-platform
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - ./volumes/zookeeper:/var/lib/zookeeper/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | nc localhost 2181 | grep -i mode"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    networks:
      - data-platform
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"

    volumes:
      - ./volumes/kafka:/var/lib/kafka/data
    mem_limit: 768m
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 29092"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - data-platform
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: jobs_dwh
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    mem_limit: 512m
    shm_size: 128m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d jobs_dwh"]
      interval: 10s
      timeout: 5s
      retries: 5
  apicurio:
    image: apicurio/apicurio-registry-sql:2.4.3.Final
    restart: unless-stopped
    networks:
      - data-platform
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      REGISTRY_DATASOURCE_URL: jdbc:postgresql://postgres:5432/registry
      REGISTRY_DATASOURCE_USERNAME: ${POSTGRES_USER}
      REGISTRY_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      REGISTRY_LOG_LEVEL: INFO
      REGISTRY_UI_FEATURES_READONLY: "false"
    ports:
      - "8085:8080"
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    networks:
      - data-platform
    depends_on:
      kafka:
        condition: service_healthy
      apicurio:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://apicurio:8080/apis/ccompat/v6
    ports:
      - "8090:8080"
    mem_limit: 256m

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    networks:
      - data-platform
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - ./volumes/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5


  airflow-init:
    image: apache/airflow:2.8.4-python3.11
    networks:
      - data-platform
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/airflow_metadata
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER:-admin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    entrypoint:
      - /bin/bash
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com || true
    mem_limit: 512m

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    restart: unless-stopped
    networks:
      - data-platform
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      apicurio:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/airflow_metadata
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_FERNET_KEY}
      SCHEMA_REGISTRY_URL: http://apicurio:8080/apis/ccompat/v6
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    volumes:
      - ./volumes/dbt:/opt/airflow/dbt
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt:/opt/airflow/dbt:dele
      - ./src:/opt/airflow/src
      - ./scripts:/opt/airflow/scripts
      - ./schemas:/opt/airflow/schemas
      - ./configs:/opt/airflow/configs
      - ./volumes/airflow-logs:/opt/airflow/logs
    command: scheduler
    mem_limit: 1024m

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    restart: unless-stopped
    networks:
      - data-platform
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/airflow_metadata
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_FERNET_KEY}
      SCHEMA_REGISTRY_URL: http://apicurio:8080/apis/ccompat/v6
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt:/opt/airflow/dbt
      - ./src:/opt/airflow/src
      - ./scripts:/opt/airflow/scripts
      - ./schemas:/opt/airflow/schemas
      - ./configs:/opt/airflow/configs
      - ./volumes/airflow-logs:/opt/airflow/logs
    ports:
      - "8082:8080"
    command: webserver
    mem_limit: 1024m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s


  crawler:
    build:
      context: .
      dockerfile: docker/Dockerfile.crawler
    restart: "no"
    networks:
      - data-platform
    depends_on:
      kafka:
        condition: service_healthy
      apicurio:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://apicurio:8080/apis/ccompat/v6
      KAFKA_TOPIC: job-listings
      SCHEMA_PATH: /app/schemas/raw/job_listing.avsc
      PYTHONPATH: /app
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
      - ./schemas:/app/schemas
      - ./scripts:/app/scripts
    entrypoint: []
    command: python3 -m src.crawlers.generic_crawler --config /app/configs/crawlers/topcv.yaml --max-pages 2
    mem_limit: 256m

  kafka-consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    restart: always
    entrypoint: []
    networks:
      - data-platform
    depends_on:
      kafka:
        condition: service_healthy
      apicurio:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://apicurio:8080/apis/ccompat/v6
      KAFKA_TOPIC: job-listings
      MINIO_ENDPOINT: http://minio:9000
      MINIO_USER: admin
      MINIO_PASSWORD: changeme123
      MINIO_BUCKET_NAME: job-postings-raw
      PYTHONPATH: /opt/airflow
    volumes:
      - ./src:/opt/airflow/src
      - ./schemas:/opt/airflow/schemas
    command: python3 -m src.kafka.run_consumer
    mem_limit: 256m

  query-tool:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      DB_PATH: /app/dbt/job_lakehouse.duckdb
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: changeme123
      AWS_S3_ENDPOINT: minio:9000
    volumes:
      - ./dbt:/app/dbt:ro
    working_dir: /app
    networks:
      - data-platform