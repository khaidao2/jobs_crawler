version: "3.9"

services:
  zookeeper:
    image: bitnami/zookeeper:3.9
    restart: unless-stopped
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    volumes:
      - ./volumes/zookeeper:/bitnami/zookeeper
    mem_limit: 256m

  kafka:
    image: bitnami/kafka:3.6
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    volumes:
      - ./volumes/kafka:/bitnami/kafka
    mem_limit: 768m

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "8081:8081"
    mem_limit: 256m

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - ./volumes/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    mem_limit: 256m

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: jobs_dwh
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    mem_limit: 512m
    shm_size: 128m

  airflow:
    image: apache/airflow:2.8.4-python3.11
    restart: unless-stopped
    depends_on:
      - postgres
      - kafka
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/jobs_dwh
      _PIP_ADDITIONAL_REQUIREMENTS: dbt-postgres==1.7.4 duckdb==0.10.2 pyiceberg==0.6.1 confluent-kafka==2.3.0 psycopg2-binary==2.9.9 pandas==2.2.2
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt:/opt/airflow/dbt
      - ./scripts:/opt/airflow/scripts
      - ./schema-registry:/opt/airflow/schema-registry
      - ./volumes/airflow-logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: standalone
    mem_limit: 768m

  crawler:
    build:
      context: .
      dockerfile: crawler/Dockerfile
    restart: unless-stopped
    depends_on:
      - kafka
      - schema-registry
    volumes:
      - ./crawler:/app/crawler
      - ./schema-registry:/app/schema-registry
    command: sleep infinity

